<article class="search-result">
    <hgroup>
    <h6>
        {% if result.uri %}
            <a href="{{ result.uri }}">{{ result.label }}</a>
        {% else %}
            {{ result.label }}
        {% endif %}
    </h6>
    <small>{{ result.entity_type }}</small>
    </hgroup> 
    {% if result.search_text %}
        <p>{{ result.search_text|truncatechars:220 }}</p>
    {% endif %}
</article>
